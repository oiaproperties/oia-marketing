name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/oia-marketing
            git pull origin main
            npm install --omit=dev
            npx prisma migrate deploy
            npm run build
            pm2 restart oia-marketing || pm2 start npm --name oia-marketing -- start
            pm2 save
